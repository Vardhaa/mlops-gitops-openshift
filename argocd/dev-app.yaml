apiVersion: argoproj.io/v1alpha1 
kind: Application 
metadata: 
  name: sentiment-api-dev 
  namespace: openshift-gitops 
spec: 
  project: default 
  source: 
    repoURL: https://github.com/Vardhaa/mlops-gitops-openshift 
    targetRevision: main 
    path: manifests/overlays/dev 
  destination: 
    server: https://kubernetes.default.svc 
    namespace: ocp-dev-1 
  syncPolicy: 
    automated: 
      prune: true 
      selfHeal: true 
    syncOptions: 
      - CreateNamespace=true 
